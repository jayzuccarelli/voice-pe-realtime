name: CI

on:
  push:
  pull_request:

jobs:
  broker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint
        run: |
          pip install ruff
          ruff check broker/realtime_broker
      - name: Build image
        run: docker build -t voicepe-realtime:ci ./broker
